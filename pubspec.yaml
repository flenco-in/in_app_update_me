name: in_app_update_me
description: A comprehensive Flutter plugin for in-app updates supporting both Android and iOS with direct update capabilities, flexible updates, and force update handling.
version: 1.2.0
homepage: https://github.com/atishpaul/in_app_update_me
repository: https://github.com/atishpaul/in_app_update_me
issue_tracker: https://github.com/atishpaul/in_app_update_me/issues
documentation: https://github.com/atishpaul/in_app_update_me#readme

topics:
  - in-app-update
  - flutter-plugin
  - android-ios
  - force-update
  - flexible-updates

# Color.withValues (used by the dialogs) requires Flutter 3.27 / Dart 3.6.
environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  # Wide range so consumers on older Flutter can still resolve; only the
  # stable PackageInfo.fromPlatform() API is used.
  package_info_plus: '>=8.1.2 <11.0.0'
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.flenco.in_app_update_me
        pluginClass: InAppUpdateMePlugin
      ios:
        pluginClass: InAppUpdateMePlugin